name: Build Windows

on:
  push:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Compute tag
        id: tag
        shell: bash
        run: |
          BASE=$(node -p "const v=require('./package.json').version.split('.');v[2]=${{ github.run_number }};'v'+v.join('.')")
          echo "value=$BASE" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create ${{ steps.tag.outputs.value }} --title "${{ steps.tag.outputs.value }}" --notes "Commit ${{ github.sha }}" --prerelease

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: npm ci

      - name: Bump version
        shell: bash
        run: |
          VERSION="${{ steps.tag.outputs.value }}"
          npm version "${VERSION#v}" --no-git-tag-version

      - name: Build
        run: npm run build

      - name: Package Windows installer
        run: npx electron-builder --win --publish never

      - name: Upload EXE to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $exe = Get-ChildItem -Path dist -Filter "*.exe" -Recurse | Select-Object -First 1
          if (-not $exe) { throw "No .exe found in dist/" }
          Write-Host "Uploading $($exe.FullName)"
          gh release upload ${{ steps.tag.outputs.value }} $exe.FullName --clobber
