appId: com.propresent.app
productName: songpresent
copyright: Copyright © 2026

directories:
  output: dist

files:
  - out/**/*
  - package.json

extraResources:
  - from: data/
    to: default-data/

win:
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: true
  perMachine: false
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
